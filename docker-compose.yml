version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-blog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bloguser
      POSTGRES_PASSWORD: blogpassword
      POSTGRES_DB: aicodingblog
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloguser -d aicodingblog"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ai-blog-app
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://bloguser:blogpassword@postgres:5432/aicodingblog
      - NEXTAUTH_URL=http://localhost:3001
      - NEXTAUTH_SECRET=development-secret-change-in-production
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
      - uploads:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

volumes:
  postgres-data:
  uploads:
